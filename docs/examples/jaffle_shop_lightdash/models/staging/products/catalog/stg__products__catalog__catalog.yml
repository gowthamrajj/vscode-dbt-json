version: "2"
models:
  - name: stg__products__catalog__catalog
    group: products
    description: ""
    docs:
      node_color: "#B6AB33"
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - json
        - staging
    columns:
      - name: description
        data_type: varchar
        description: Product description
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product Description
            group_label: Product Fields
      - name: is_beverage
        data_type: varchar
        description: Boolean flag for beverage products
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            type: boolean
            label: Is Beverage?
            group_label: Product Fields
      - name: is_jaffle
        data_type: varchar
        description: Boolean flag for jaffle products
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            type: boolean
            label: Is Jaffle?
            group_label: Product Fields
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: product_name
        data_type: varchar
        description: Product name, trimmed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product Name
            group_label: Product Fields
      - name: product_price_cents
        data_type: varchar
        description: Product price in cents
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          metrics:
            metric_product_price_cents_sum:
              ai_hint: Use this for internal calculations or when cent precision is required
              type: sum
              label: Product Price Sum (cents)
              group_label: Product Metrics
      - name: product_price_dollars
        data_type: varchar
        description: Product price in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          metrics:
            metric_product_price_dollars_sum:
              ai_hint: Use this metric to calculate total product catalog value or analyze
                average product pricing
              type: sum
              label: Total Product Value
              group_label: Product Metrics
      - name: product_sku
        data_type: varchar
        description: Product SKU identifier
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product SKU
            group_label: Product Fields
      - name: product_type
        data_type: varchar
        description: Product category (jaffle, beverage)
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product Type
            group_label: Product Fields
