name: jaffle_shop_lightdash
version: 1.0.0
config-version: 2

profile: jaffle_shop_lightdash

model-paths: ['models']
analysis-paths: ['analyses']
test-paths: ['tests']
seed-paths: ['seeds']
macro-paths: ['macros']

target-path: target # compiled SQL + manifest
packages-install-path: dbt_packages
log-path: logs

clean-targets:
  - target
  - dbt_packages

quoting:
  database: false
  schema: false
  identifier: false

vars:
  event_dates: '2016-01-01~2017-01-01'  
  load_timestamp: '{{ run_started_at }}'

flags:
  send_anonymous_usage_stats: false

seeds:
  jaffle_shop_lightdash:
    +quote_columns: false
    +schema: seeds

models:
  jaffle_shop_lightdash:
    # Staging layer - raw data cleanup and standardization
    staging:
      +materialized: ephemeral
      +schema: staging
      customers:
        +group: customers
      sales:
        +group: sales
      products:
        +group: products
      supply_chain:
        +group: supply_chain

    # Intermediate layer - business logic and transformations
    intermediate:
      +materialized: ephemeral
      customers:
        +group: customers
      sales:
        +group: sales
      products:
        +group: products
      supply_chain:
        +group: supply_chain

    # Marts layer - business-ready models
    marts:
      +materialized: table
      customers:
        +group: customers
      sales:
        +group: sales
      products:
        +group: products
      analytics:
        +group: analytics

tests:
  jaffle_shop_lightdash:
    +store_failures: true
    generic:
      +severity: warn

on-run-start:
  - "{{ log('Run started: ' ~ run_started_at, info=True) }}"

on-run-end:
  - "{{ log('Run finished: ' ~ run_finished_at, info=True) }}"

dispatch:
  - macro_namespace: dbt
    search_order: [jaffle_shop_lightdash, dbt]
