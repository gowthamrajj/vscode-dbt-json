version: "2"
models:
  - name: mart__sales__reporting__revenue
    group: sales
    description: ""
    docs:
      node_color: "#059669"
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - json
        - lightdash-explore
        - mart
    meta:
      required_filters:
        - datetime: inThePast 14 days
    columns:
      - name: customer_id
        data_type: varchar
        description: Foreign key to customer
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: string
            label: Customer ID
            group_label: Customer Fields
      - name: customer_name
        data_type: varchar
        description: Customer full name, trimmed of whitespace
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__customers__profiles__clean
          dimension:
            type: string
            label: Customer Name
      - name: datetime
        data_type: timestamp(6)
        description: Event Datetime Column
        meta:
          type: dim
          dimension:
            type: timestamp
            label: Datetime
            sql: portal_partition_hourly
      - name: is_weekend_order
        data_type: varchar
        description: Boolean flag for weekend orders
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Is Weekend Order
      - name: order_date
        data_type: varchar
        description: Date when order was placed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: date
            label: Order Date
            group_label: Order Fields
      - name: order_id
        data_type: varchar
        description: Unique identifier for each order
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: string
            label: Order ID
            group_label: Order Fields
          metrics:
            metric_order_count:
              ai_hint: Use this to count total orders or analyze order volume trends over time
              type: count_distinct
              label: Number of Orders
              group_label: Order Metrics
      - name: order_month
        data_type: varchar
        description: Order month
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Order Month
      - name: order_quarter
        data_type: varchar
        description: Order quarter
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Order Quarter
      - name: order_year
        data_type: varchar
        description: Order year
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Order Year
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            type: number
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: revenue_tier
        data_type: varchar
        description: Revenue tier classification
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Revenue Tier
      - name: store_id
        data_type: varchar
        description: Foreign key to store
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: string
            label: Store ID
            group_label: Store Fields
      - name: store_name
        data_type: varchar
        description: Store location name
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__stores__locations
          dimension:
            type: string
            label: Store Name
      - name: subtotal_dollars
        data_type: varchar
        description: Order subtotal in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Subtotal Dollars
            hidden: true
          metrics:
            metric_subtotal_revenue:
              ai_hint: Use this to analyze pre-tax revenue for reporting and comparison across
                tax jurisdictions
              type: sum
              label: Total Subtotal Revenue
              group_label: Revenue Metrics
      - name: tax_dollars
        data_type: varchar
        description: Tax amount in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Tax Dollars
            hidden: true
          metrics:
            metric_total_tax:
              ai_hint: Use this for tax reporting and compliance analysis
              type: sum
              label: Total Tax Collected
              group_label: Revenue Metrics
      - name: total_dollars
        data_type: varchar
        description: Total order amount in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__revenue
          dimension:
            type: string
            label: Total Dollars
            hidden: true
          metrics:
            metric_total_revenue:
              ai_hint: Use this as the primary revenue metric for financial reporting and
                dashboard KPIs
              type: sum
              label: Total Revenue
              group_label: Revenue Metrics
            metric_avg_order_value:
              ai_hint: Use this to track AOV trends over time, a key e-commerce performance
                indicator
              type: average
              label: Average Order Value (AOV)
              group_label: Revenue Metrics
      - name: portal_partition_monthly
        data_type: date
        description: Monthly Partition Column
        meta:
          type: dim
          dimension:
            type: date
            label: Portal Partition Monthly
            hidden: true
      - name: portal_partition_daily
        data_type: date
        description: Daily Partition Column
        meta:
          type: dim
          dimension:
            type: date
            label: Portal Partition Daily
            hidden: true
      - name: portal_partition_hourly
        data_type: timestamp(6)
        description: Hourly Partition Column
        meta:
          type: dim
          dimension:
            type: timestamp
            label: Portal Partition Hourly
            hidden: true
