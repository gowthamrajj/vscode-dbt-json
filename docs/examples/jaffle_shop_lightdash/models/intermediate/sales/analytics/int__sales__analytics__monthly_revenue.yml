version: "2"
models:
  - name: int__sales__analytics__monthly_revenue
    group: sales
    description: Monthly rollup of sales data aggregating revenue, orders, and
      customer metrics by store
    docs:
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - intermediate
        - json
    columns:
      - name: customer_first_name
        data_type: varchar
        description: Customer first name
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__customers__profiles__clean
      - name: customer_id
        data_type: varchar
        description: Foreign key to customer
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            label: Customer ID
            group_label: Customer Fields
      - name: customer_name
        data_type: varchar
        description: Customer full name, trimmed of whitespace
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__customers__profiles__clean
      - name: datetime
        data_type: timestamp(6)
        description: Event Datetime Column
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.int__sales__analytics__monthly_revenue
          dimension:
            type: timestamp
            label: Datetime
            time_intervals:
              - MONTH
              - YEAR
      - name: order_date
        data_type: varchar
        description: Date when order was placed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: date
            label: Order Date
            group_label: Order Fields
      - name: order_id
        data_type: varchar
        description: Unique identifier for each order
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            label: Order ID
            group_label: Order Fields
          metrics:
            metric_order_count:
              ai_hint: Use this to count total orders or analyze order volume trends over time
              type: count_distinct
              label: Number of Orders
              group_label: Order Metrics
      - name: ordered_at
        data_type: varchar
        description: Timestamp when order was placed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: timestamp
            label: Ordered At
            group_label: Order Fields
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: store_id
        data_type: varchar
        description: Foreign key to store
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            label: Store ID
            group_label: Store Fields
      - name: store_name
        data_type: varchar
        description: Store location name
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__stores__locations
      - name: portal_partition_monthly
        data_type: date
        description: Monthly Partition Column
        meta:
          type: dim
          dimension:
            label: Portal Partition Monthly
