      - name: is_perishable_supply
        data_type: varchar
        description: Whether this supply is perishable
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__products__reporting__cost_efficiency
          dimension:
            type: string
            label: Is Perishable Supply
      - name: perishable_risk_level
        data_type: varchar
        description: Risk level based on perishable supplies
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__products__reporting__cost_efficiency
          dimension:
            type: string
            label: Perishable Risk Level
