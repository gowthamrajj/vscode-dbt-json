version: "2"
models:
  - name: mart__analytics__dashboard__comprehensive_analytics
    group: analytics
    description: ""
    docs:
      node_color: "#059669"
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - json
        - lightdash-explore
        - mart
    columns:
      - name: business_impact_score
        data_type: varchar
        description: Business impact score based on cost efficiency (0-100)
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__analytics__dashboard__comprehensive_analytics
          dimension:
            type: string
            label: Business Impact Score
            hidden: true
      - name: cost_to_price_ratio
        data_type: varchar
        description: Individual supply cost as ratio of selling price
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__products__reporting__cost_efficiency
          dimension:
            type: string
            label: Cost To Price Ratio
            hidden: true
      - name: is_perishable_supply
        data_type: varchar
        description: Whether this supply is perishable
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__products__reporting__cost_efficiency
          dimension:
            type: string
            label: Is Perishable Supply
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            type: number
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: product_name
        data_type: varchar
        description: Product name, trimmed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            type: string
            label: Product Name
            group_label: Product Fields
      - name: product_price_dollars
        data_type: varchar
        description: Product price in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            type: string
            label: Product Price Dollars
            hidden: true
          metrics:
            metric_product_price_dollars_sum:
              ai_hint: Use this metric to calculate total product catalog value or analyze
                average product pricing
              type: sum
              label: Total Product Value
              group_label: Product Metrics
      - name: product_sku
        data_type: varchar
        description: Product SKU identifier
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__items__order_details
          dimension:
            type: string
            label: Product SKU
            group_label: Product Fields
      - name: product_type
        data_type: varchar
        description: Product type derived from SKU pattern
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__items__order_details
          dimension:
            type: string
            label: Product Type
            group_label: Product Fields
      - name: strategic_recommendation
        data_type: varchar
        description: Strategic business recommendation
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__analytics__dashboard__comprehensive_analytics
          dimension:
            type: string
            label: Strategic Recommendation
      - name: total_items_sold
        data_type: varchar
        description: Total quantity of this product sold
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__products__analytics__product_popularity
          dimension:
            type: string
            label: Total Items Sold
            hidden: true
          metrics:
            metric_total_items_sold:
              ai_hint: Use this to analyze product sales volume and inventory demand for
                best-selling items
              type: sum
              label: Total Items Sold
              group_label: Product Popularity
            metric_avg_items_per_order:
              ai_hint: Use this to understand typical order quantities for inventory and
                fulfillment planning
              type: average
              label: Average Items Per Order
              group_label: Product Popularity
      - name: total_orders
        data_type: varchar
        description: Number of unique orders containing this product
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__products__analytics__product_popularity
          dimension:
            type: string
            label: Total Orders
            hidden: true
          metrics:
            metric_product_order_count:
              ai_hint: Use this to understand product popularity and which items are
                frequently purchased together
              type: sum
              label: Orders Containing Product
              group_label: Product Popularity
