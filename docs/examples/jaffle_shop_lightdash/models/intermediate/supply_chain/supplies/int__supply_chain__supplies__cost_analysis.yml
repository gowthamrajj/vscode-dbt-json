version: "2"
models:
  - name: int__supply_chain__supplies__cost_analysis
    group: supply_chain
    description: ""
    docs:
      node_color: "#DAA520"
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - intermediate
        - json
    columns:
      - name: cost_cents
        data_type: varchar
        description: Supply cost in cents
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: cost_dollars
        data_type: varchar
        description: Supply cost in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
          metrics:
            metric_supply_cost_total:
              ai_hint: Use this to calculate total supply chain costs and analyze cost of
                goods sold (COGS)
              type: sum
              label: Total Supply Cost
              group_label: Supply Chain Metrics
            metric_supply_cost_average:
              ai_hint: Use this to understand average cost per supply item for inventory
                management
              type: average
              label: Average Supply Cost
              group_label: Supply Chain Metrics
      - name: cost_tier
        data_type: varchar
        description: Supply cost tier classification
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.int__supply_chain__supplies__cost_analysis
      - name: is_perishable
        data_type: varchar
        description: Boolean flag for perishable supplies
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: product_name
        data_type: varchar
        description: Product name, trimmed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product Name
            group_label: Product Fields
      - name: product_price_dollars
        data_type: varchar
        description: Product price in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          metrics:
            metric_product_price_dollars_sum:
              ai_hint: Use this metric to calculate total product catalog value or analyze
                average product pricing
              type: sum
              label: Total Product Value
              group_label: Product Metrics
      - name: product_sku
        data_type: varchar
        description: Associated product SKU
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: product_type
        data_type: varchar
        description: Product category (jaffle, beverage)
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__products__catalog__catalog
          dimension:
            label: Product Type
            group_label: Product Fields
      - name: supply_category
        data_type: varchar
        description: Supply category classification
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: supply_id
        data_type: varchar
        description: Unique identifier for each supply item
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: supply_name
        data_type: varchar
        description: Supply item name, trimmed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__supply_chain__supplies__inventory
      - name: supply_to_price_ratio
        data_type: varchar
        description: Supply cost as percentage of product price
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__supply_chain__supplies__cost_analysis
          metrics:
            metric_avg_cost_ratio:
              ai_hint: Use this to analyze profit margins and identify products with
                unfavorable cost structures
              type: average
              label: Average Cost-to-Price Ratio
              group_label: Profitability Metrics
