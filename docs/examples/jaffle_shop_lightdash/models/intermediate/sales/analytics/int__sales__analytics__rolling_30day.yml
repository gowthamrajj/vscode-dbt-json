version: "2"
models:
  - name: int__sales__analytics__rolling_30day
    group: sales
    description: 30-day rolling window analysis of sales metrics partitioned by
      store for trend analysis
    docs:
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - intermediate
        - json
    columns:
      - name: order_date
        data_type: varchar
        description: Date when order was placed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: date
            label: Order Date
            group_label: Order Fields
      - name: order_id_count
        data_type: number
        description: Number of orders in the last 30 days
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            label: Order ID
            group_label: Order Fields
          metrics:
            metric_order_count:
              ai_hint: Use this to count total orders or analyze order volume trends over time
              type: count_distinct
              label: Number of Orders
              group_label: Order Metrics
            metric_rolling_order_count:
              ai_hint: Use this to track order volume trends over 30-day rolling windows
              type: count
              label: 30-Day Order Count
              group_label: Rolling Window Metrics
      - name: order_total_dollars_sum
        data_type: number
        description: Revenue metrics for the last 30 days (sum, min, max)
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__sales__orders__enriched
          metrics:
            metric_order_total_dollars:
              ai_hint: Use this metric for revenue analysis in dollar amounts. This is the
                primary metric for overall sales performance and revenue trends
              type: sum
              label: Total Revenue (Dollars)
              group_label: Order Metrics
            metric_rolling_revenue_sum:
              ai_hint: Use this to analyze rolling 30-day revenue trends by store
              type: sum
              label: 30-Day Revenue (Sum)
              group_label: Rolling Window Metrics
            metric_rolling_revenue_min:
              ai_hint: Use this to identify lowest revenue days within 30-day windows
              type: min
              label: 30-Day Revenue (Min)
              group_label: Rolling Window Metrics
            metric_rolling_revenue_max:
              ai_hint: Use this to identify peak revenue days within 30-day windows
              type: max
              label: 30-Day Revenue (Max)
              group_label: Rolling Window Metrics
      - name: order_total_dollars_min
        data_type: number
        description: Revenue metrics for the last 30 days (sum, min, max)
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__sales__orders__enriched
          metrics:
            metric_order_total_dollars:
              ai_hint: Use this metric for revenue analysis in dollar amounts. This is the
                primary metric for overall sales performance and revenue trends
              type: sum
              label: Total Revenue (Dollars)
              group_label: Order Metrics
      - name: order_total_dollars_max
        data_type: number
        description: Revenue metrics for the last 30 days (sum, min, max)
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.int__sales__orders__enriched
          metrics:
            metric_order_total_dollars:
              ai_hint: Use this metric for revenue analysis in dollar amounts. This is the
                primary metric for overall sales performance and revenue trends
              type: sum
              label: Total Revenue (Dollars)
              group_label: Order Metrics
      - name: store_id
        data_type: varchar
        description: Foreign key to store
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            label: Store ID
            group_label: Store Fields
      - name: store_name
        data_type: varchar
        description: Store location name
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__stores__locations
      - name: portal_partition_daily
        data_type: date
        description: Portal Partition Daily
        meta:
          type: dim
