version: "2"
models:
  - name: mart__sales__reporting__profitability
    group: sales
    description: ""
    docs:
      node_color: "#059669"
      show: true
    private: false
    contract:
      enforced: false
    config:
      tags:
        - json
        - lightdash-explore
        - mart
    meta:
      required_filters:
        - datetime: inThePast 14 days
    columns:
      - name: avg_order_value_dollars
        data_type: varchar
        description: Average order value in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Avg Order Value Dollars
            hidden: true
          metrics:
            metric_aov_by_segment:
              ai_hint: Use this to compare average order values across stores, time periods,
                or customer segments
              type: average
              label: AOV by Segment
              group_label: Profitability Metrics
      - name: datetime
        data_type: timestamp(6)
        description: Event Datetime Column
        meta:
          type: dim
          dimension:
            type: timestamp
            label: Datetime
            sql: portal_partition_hourly
      - name: order_count
        data_type: varchar
        description: Number of orders
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Order Count
            hidden: true
          metrics:
            metric_order_volume:
              ai_hint: Use this to analyze transaction volume trends and store performance
              type: sum
              label: Order Volume
              group_label: Profitability Metrics
      - name: order_date
        data_type: varchar
        description: Date when order was placed
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: date
            label: Order Date
            group_label: Order Fields
      - name: order_year_month
        data_type: varchar
        description: Order year-month
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Order Year Month
      - name: portal_source_count
        data_type: bigint
        description: Portal Source Count
        meta:
          type: fct
          dimension:
            type: number
            label: Portal Source Count
            hidden: true
          metrics:
            metric_portal_source_count:
              type: sum
              label: Portal Source Count
      - name: revenue_per_day
        data_type: varchar
        description: Daily revenue per store
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Revenue Per Day
            hidden: true
          metrics:
            metric_daily_revenue:
              ai_hint: Use this to analyze daily sales patterns and identify peak revenue days
                for staffing and inventory
              type: sum
              label: Daily Revenue
              group_label: Profitability Metrics
      - name: store_id
        data_type: varchar
        description: Foreign key to store
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__orders__standardized
          dimension:
            type: string
            label: Store ID
            group_label: Store Fields
      - name: store_name
        data_type: varchar
        description: Store location name
        meta:
          type: dim
          origin:
            id: model.jaffle_shop_lightdash.stg__sales__stores__locations
          dimension:
            type: string
            label: Store Name
      - name: total_revenue_dollars
        data_type: varchar
        description: Total revenue in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Total Revenue Dollars
            hidden: true
          metrics:
            metric_aggregated_revenue:
              ai_hint: Use this for store-level or time-based revenue aggregation and
                profitability analysis
              type: sum
              label: Aggregated Revenue
              group_label: Profitability Metrics
      - name: total_tax_collected_dollars
        data_type: varchar
        description: Total tax collected in dollars
        meta:
          type: fct
          origin:
            id: model.jaffle_shop_lightdash.mart__sales__reporting__profitability
          dimension:
            type: string
            label: Total Tax Collected Dollars
            hidden: true
          metrics:
            metric_aggregated_tax:
              ai_hint: Use this for tax reporting by store location or time period
              type: sum
              label: Aggregated Tax
              group_label: Profitability Metrics
      - name: portal_partition_monthly
        data_type: date
        description: Monthly Partition Column
        meta:
          type: dim
          dimension:
            type: date
            label: Portal Partition Monthly
            hidden: true
      - name: portal_partition_daily
        data_type: date
        description: Daily Partition Column
        meta:
          type: dim
          dimension:
            type: date
            label: Portal Partition Daily
            hidden: true
      - name: portal_partition_hourly
        data_type: timestamp(6)
        description: Hourly Partition Column
        meta:
          type: dim
          dimension:
            type: timestamp
            label: Portal Partition Hourly
            hidden: true
